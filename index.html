<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Planti">
  <meta name="theme-color" content="#2563EB">
  <meta name="description" content="Conectando profissionais de saúde a contratantes">
  <title>Planti</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
  <style>
    #splash {
      position: fixed; inset: 0; z-index: 9999;
      background: #fff;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 10px;
      transition: opacity 0.4s;
    }
    #splash.hide { opacity: 0; pointer-events: none; }
    .splash-dot  { width: 16px; height: 16px; background: #2563EB; border-radius: 50%; }
    .splash-name { font-family: 'Fraunces', serif; font-size: 28px; font-weight: 600; letter-spacing: -0.5px; color: #111827; }
  </style>
</head>
<body>

<div id="splash">
  <div class="splash-dot"></div>
  <div class="splash-name">Planti</div>
</div>

<div id="app">

  <!-- ══ TELA: Login ══ -->
  <div class="screen" id="screen-login">
    <div class="screen-body no-nav" style="display:flex;flex-direction:column;justify-content:center;padding-top:60px">
      <div style="text-align:center;margin-bottom:36px">
        <div style="display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:8px">
          <div style="width:16px;height:16px;background:#2563EB;border-radius:50%"></div>
          <span style="font-family:'Fraunces',serif;font-size:28px;font-weight:600;letter-spacing:-.5px">Planti</span>
        </div>
        <p style="font-size:14px;color:#6B7280">Conectando profissionais de saúde</p>
      </div>
      <div class="card">
        <div class="form-group">
          <label for="login-email">E-mail</label>
          <input type="email" id="login-email" placeholder="seu@email.com" autocomplete="email">
        </div>
        <div class="form-group" style="margin-bottom:20px">
          <label for="login-senha">Senha</label>
          <input type="password" id="login-senha" placeholder="Sua senha" autocomplete="current-password">
        </div>
        <button class="btn btn-primary" id="btn-login">Entrar</button>
        <p id="login-erro" style="font-size:13px;color:#DC2626;margin-top:10px;text-align:center;display:none"></p>
      </div>
      <p style="text-align:center;font-size:14px;color:#6B7280;margin-top:20px">
        Não tem conta?
        <a href="#" id="link-cadastro" style="color:#2563EB;font-weight:500;text-decoration:none">Cadastre-se</a>
      </p>
    </div>
  </div>

  <!-- ══ TELA: Cadastro ══ -->
  <div class="screen hidden-right" id="screen-cadastro">
    <div class="app-header">
      <button class="back-btn" id="cadastro-back">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M11 4L6 9l5 5"/></svg>
        Voltar
      </button>
      <span class="header-title">Criar conta</span>
      <div style="width:60px"></div>
    </div>
    <div class="screen-body no-nav" id="cadastro-mount"></div>
  </div>

  <!-- ══ TELA: Home ══ -->
  <div class="screen hidden-right" id="screen-home">
    <div class="app-header">
      <div style="display:flex;align-items:center;gap:8px">
        <div style="width:12px;height:12px;background:#2563EB;border-radius:50%"></div>
        <span style="font-family:'Fraunces',serif;font-size:20px;font-weight:600;letter-spacing:-.4px">Planti</span>
      </div>
      <button class="header-action" id="btn-logout" title="Sair">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      </button>
    </div>
    <div class="screen-body" id="home-mount"></div>
  </div>

  <!-- ══ TELA: Disponibilidades ══ -->
  <div class="screen hidden-right" id="screen-disponibilidade">
    <div class="app-header">
      <span class="header-title">Meus plantões</span>
    </div>
    <div class="screen-body" id="disp-mount">
      <div class="empty-state">
        <div class="empty-icon">📅</div>
        <div class="empty-title">Nenhum plantão ainda</div>
        <div class="empty-text">Publique sua disponibilidade para ser encontrado por contratantes.</div>
        <button class="btn btn-primary" style="margin-top:8px" onclick="window.__abrirNovaDisp()">+ Nova disponibilidade</button>
      </div>
    </div>
  </div>

  <!-- ══ TELA: Mensagens ══ -->
  <div class="screen hidden-right" id="screen-chat-list">
    <div class="app-header">
      <span class="header-title">Mensagens</span>
    </div>
    <div class="screen-body" style="padding:0" id="chat-list-mount">
      <div class="empty-state">
        <div class="empty-icon">💬</div>
        <div class="empty-title">Nenhuma conversa ainda</div>
        <div class="empty-text">As conversas com contratantes aparecerão aqui.</div>
      </div>
    </div>
  </div>

  <!-- ══ TELA: Perfil ══ -->
  <div class="screen hidden-right" id="screen-perfil">
    <div class="app-header">
      <span class="header-title">Meu perfil</span>
    </div>
    <div class="screen-body" id="perfil-mount"></div>
  </div>

  <!-- ══ Bottom Nav ══ -->
  <nav class="bottom-nav" id="bottom-nav" style="display:none"></nav>

</div>

<div class="toast" id="toast"></div>

<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  }
</script>
<script type="module" src="js/app.js"></script>

</body>
</html>
